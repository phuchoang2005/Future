<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">

        <defs>
            <radialGradient id="bg-glow" cx="85%" cy="15%" r="65%">
                <stop offset="0%" stop-color="#dbeafe" stop-opacity="1"/>
                <stop offset="100%" stop-color="#f8fafc" stop-opacity="0"/>
            </radialGradient>
            <radialGradient id="bg-glow2" cx="15%" cy="85%" r="65%">
                <stop offset="0%" stop-color="#e0e7ff" stop-opacity="0.8"/>
                <stop offset="100%" stop-color="#f8fafc" stop-opacity="0"/>
            </radialGradient>
            <radialGradient id="bg-glow3" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
                <stop offset="100%" stop-color="#f8fafc" stop-opacity="0"/>
            </radialGradient>
            
            <linearGradient id="primary-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#2563eb"/>
                <stop offset="100%" stop-color="#4f46e5"/>
            </linearGradient>
            
            <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#0f172a"/>
                <stop offset="100%" stop-color="#334155"/>
            </linearGradient>
            
            <linearGradient id="sidebar-grad" x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="rgba(255, 255, 255, 0.95)"/>
                <stop offset="100%" stop-color="rgba(255, 255, 255, 0.8)"/>
            </linearGradient>
            
            <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#94a3b8" flood-opacity="0.15"/>
            </filter>
            <filter id="shadow-sm" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#94a3b8" flood-opacity="0.1"/>
            </filter>
            
            <filter id="glow-primary" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#3b82f6" flood-opacity="0.4"/>
            </filter>
            <filter id="glow-success" x="-20%" y="-20%" width="140%" height="140%">
                <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#10b981" flood-opacity="0.4"/>
            </filter>
            
            <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="16"/>
            </filter>
        </defs>
        <style><![CDATA[

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
        * { font-family: 'Inter', sans-serif; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        
        .bg-base { fill: #f8fafc; }
        .card { fill: rgba(255, 255, 255, 0.8); stroke: rgba(226, 232, 240, 0.8); stroke-width: 1; backdrop-filter: blur(12px); }
        .card:hover { stroke: rgba(148, 163, 184, 0.5); transition: stroke 0.3s ease; }
        .glass { fill: url(#sidebar-grad); }
        
        .text-primary { fill: #0f172a; }
        .text-muted { fill: #64748b; }
        .gradient-text { fill: url(#text-grad); }
        
        .pulse { animation: pulse 2.5s infinite ease-in-out; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .spin { animation: spin 2s linear infinite; transform-origin: center; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } from { opacity: 0; transform: translateY(20px); } }
        
        .btn-primary { fill: url(#primary-grad); filter: url(#glow-primary); transition: filter 0.3s; cursor: pointer; }
        .btn-primary:hover { filter: brightness(1.1) url(#glow-primary); }
        .btn-primary-text { fill: #ffffff; }
        
        .btn-secondary { fill: #ffffff; stroke: #cbd5e1; cursor: pointer; transition: all 0.2s; }
        .btn-secondary:hover { fill: #f1f5f9; stroke: #94a3b8; }
        .btn-secondary-text { fill: #334155; }
        
        .btn-danger { fill: #fee2e2; stroke: #f87171; }
        .btn-danger-text { fill: #b91c1c; }
        
]]></style>
