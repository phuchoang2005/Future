services:
  frontend:
    build: .
    environment:
      API_UPSTREAM: http://host.docker.internal:8080
    ports:
      - "5173:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/healthz >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 12
